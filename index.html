<style>
:root{
  --bg:#1e1e1e;
  --panel:#252525;
  --primary:#2c5d8a;
  --text:#ffffff;
  --total-bg:#e5e5e5;
  --total-text:#2c5d8a;
}
body{font-family:Arial;background:var(--bg);color:var(--text);padding:20px;}
input,select,button{padding:10px;margin:5px;border-radius:6px;border:none;}
button{background:var(--primary);color:white;cursor:pointer;}
button:disabled{background:#555;}
.total{font-size:60px;background:var(--total-bg);color:var(--total-text);text-align:center;padding:20px;border-radius:10px;margin:20px 0;}
table{width:100%;background:#333;margin-top:15px;border-collapse:collapse;}
td,th{padding:8px;border:1px solid #555;text-align:center;}
.hidden{display:none;}
.top-right{position:fixed;top:10px;right:10px;display:flex;gap:8px;}
.toolbar{display:flex;align-items:center;gap:10px;background:var(--panel);padding:10px;border-radius:8px;}
.va-inline{display:flex;align-items:center;gap:10px;margin-left:auto;}
.warning{background:#f1c232;color:black;}
.theme-panel{background:var(--panel);padding:10px;border-radius:8px;margin-top:15px;}
</style>
</head>

<body>

<div class="top-right hidden" id="topButtons">
  <input type="date" id="filtroFecha" onchange="render()">
  <button onclick="render()">🔄</button>
  <button onclick="toggleTema()">🎨</button>
  <button onclick="descargarExcel()">📥</button>
  <button onclick="limpiarDatos()">🗑</button>
  <button onclick="logout()">⏻</button>
</div>

<div id="login">
  <h2>Login</h2>
  <select id="equipo"></select>
  <select id="usuario"></select>
  <input id="codigo" placeholder="Contraseña">
  <button onclick="loginUser()">Entrar</button>
</div>

<div id="app" class="hidden">

<h2 id="titulo"></h2>
<div class="total" id="total">0%</div>

<button onclick="vista='personal';render()">Mi Producción</button>
<button onclick="vista='equipo';render()">Equipo</button>

<div id="vistaPersonal">
  <div class="toolbar">

    <input id="pid" placeholder="PID">

    <select id="categoria" onchange="onCategoriaChange()">
      <option>SPA</option>
      <option>CORE</option>
      <option>INSIDE</option>
      <option>OTRO</option>
    </select>

    <select id="subOtro" class="hidden">
      <option>MA</option>
      <option>FIRST</option>
      <option>CBCT</option>
    </select>

    <select id="tipo">
      <option>PRIMARIO</option>
      <option>SECUNDARIO</option>
      <option>CCMOD IPL</option>
      <option>CCMOD</option>
      <option>QC</option>
    </select>

    <button id="btnGuardar" onclick="agregar()">Guardar</button>

    <div class="va-inline">
      <b>VA</b>
      <button onclick="iniciarVA()">▶</button>
      <button onclick="finalizarVA()">■</button>
      <span id="vaTiempo"></span>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Fecha</th>
        <th>PID</th>
        <th>Tipo</th>
        <th>Status</th>
        <th>%</th>
        <th>Eliminar</th>
      </tr>
    </thead>
    <tbody id="tablaPersonal"></tbody>
  </table>
</div>

<div id="vistaEquipo" class="hidden">
  <table>
    <thead><tr><th>Usuario</th><th>Total %</th></tr></thead>
    <tbody id="tablaUsuarios"></tbody>
  </table>
</div>

<div id="vistaTema" class="hidden theme-panel">
  Fondo <input type="color" onchange="setColor('--bg',this.value)">
  Panel <input type="color" onchange="setColor('--panel',this.value)">
  Primario <input type="color" onchange="setColor('--primary',this.value)">
  Total Fondo <input type="color" onchange="setColor('--total-bg',this.value)">
  Total Texto <input type="color" onchange="setColor('--total-text',this.value)">
</div>

</div>

let registros = JSON.parse(localStorage.getItem("registros")) || [];
let usuarioActual="", equipoActual="", vista="personal";

/* === VA === */
let vaInicio=null,vaTimer=null;
/* ======== */

function limpiarDatos(){
  if(!confirm("¿Seguro que deseas borrar TODOS los datos?")) return;
  registros=[];
  localStorage.removeItem("registros");
  render();
}

Object.keys(equipos).forEach(e=>{
  let o=document.createElement("option");
  o.value=o.textContent=e;
  equipo.appendChild(o);
});

equipo.onchange=()=>{
  usuario.innerHTML="";
  equipos[equipo.value].forEach(u=>{
    let o=document.createElement("option");
    o.value=o.textContent=u.nombre;
    usuario.appendChild(o);
  });
};

equipo.selectedIndex = 0;
equipo.onchange();

function hoy(){return new Date().toISOString().split("T")[0];}

function loginUser(){
  const u = equipos[equipo.value].find(x=>x.nombre===usuario.value);
  if(!u || codigo.value!==u.pass) return;
  usuarioActual=u.nombre;
  equipoActual=equipo.value;
  login.classList.add("hidden");
  app.classList.remove("hidden");
  topButtons.classList.remove("hidden");
  titulo.innerText=usuarioActual+" - "+equipoActual;
  render();
}

function onCategoriaChange(){
  subOtro.classList.toggle("hidden",categoria.value!=="OTRO");
}

function getPorcentaje(){
  if(categoria.value!=="OTRO") return porcentajes[categoria.value][tipo.value];
  return porcentajes.OTRO[subOtro.value][tipo.value];
}

/* === VA FUNCIONAL === */
function iniciarVA(){
  if(vaInicio) return;
  vaInicio=new Date();
  btnGuardar.disabled=true;
  vaTimer=setInterval(()=>{
    let m=Math.floor((new Date()-vaInicio)/60000);
    vaTiempo.innerText=`${m} min`;
  },1000);
}

function finalizarVA(){
  if(!vaInicio) return;
  clearInterval(vaTimer);

  let fin=new Date();
  let minutos=Math.floor((fin-vaInicio)/60000);

  registros.push({
    id:Date.now(),
    Fecha:hoy(),
    PID:`VA ${vaInicio.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} - ${fin.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`,
    Usuario:usuarioActual,
    Equipo:equipoActual,
    Status:"Aproved",
    Tipo:"VA",
    Porcentaje:(minutos*0.1754).toFixed(2)
  });

  vaInicio=null;
  vaTiempo.innerText="";
  btnGuardar.disabled=false;

  guardar();
  render();
}
/* ===================== */

function agregar(){
  if(!pid.value) return;
  registros.push({
    id:Date.now(),
    Fecha:hoy(),
    PID:pid.value,
    Usuario:usuarioActual,
    Equipo:equipoActual,
    Status:"Aproved",
    Tipo: tipo.value,
    Porcentaje:getPorcentaje()
  });
  pid.value="";
  guardar(); render();
}

function cambiarStatus(id,val){
  registros.find(r=>r.id===id).Status=val;
  guardar(); render();
}

function eliminar(id){
  registros=registros.filter(r=>r.id!==id);
  guardar(); render();
}

function guardar(){
  localStorage.setItem("registros",JSON.stringify(registros));
}

function descargarExcel(){
  const ws=XLSX.utils.json_to_sheet(registros.filter(r=>r.Equipo===equipoActual));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Producción");
  XLSX.writeFile(wb,`Produccion_${equipoActual}_${hoy()}.xlsx`);
}

function toggleTema(){
  vistaTema.classList.toggle("hidden");
}

function setColor(v,c){
  document.documentElement.style.setProperty(v,c);
}

function logout(){
  usuarioActual = "";
  equipoActual = "";

  login.classList.remove("hidden");
  app.classList.add("hidden");
  topButtons.classList.add("hidden");

  codigo.value = "";
  filtroFecha.value = "";
}

function render(){

  vistaPersonal.classList.toggle("hidden",vista!=="personal");
  vistaEquipo.classList.toggle("hidden",vista!=="equipo");

  let data=registros.filter(r=>{
    return r.Equipo===equipoActual &&
    (!filtroFecha.value || r.Fecha===filtroFecha.value);
  });

  let porUsuario={};

  data.forEach(r=>{
    if(r.Status==="Aproved"){
      porUsuario[r.Usuario]=(porUsuario[r.Usuario]||0)+Number(r.Porcentaje);
    }
  });

  total.innerText=(vista==="personal"
    ? (porUsuario[usuarioActual]||0)
    : Object.values(porUsuario).reduce((a,b)=>a+b,0)/PERSONAS
  ).toFixed(2)+"%";

  tablaPersonal.innerHTML="";
  data.filter(r=>r.Usuario===usuarioActual).forEach(r=>{
    tablaPersonal.innerHTML+=`
    <tr class="${r.Status!=="Aproved"?"warning":""}">
      <td>${r.Fecha}</td>
      <td>${r.PID}</td>
      <td>${r.Tipo || "-"}</td>
      <td>
        <select onchange="cambiarStatus(${r.id},this.value)">
          ${estados.map(e=>`<option ${e===r.Status?"selected":""}>${e}</option>`).join("")}
        </select>
      </td>
      <td>${r.Status==="Aproved"?r.Porcentaje:"0"}%</td>
      <td><button onclick="eliminar(${r.id})">X</button></td>
    </tr>`;
  });

  tablaUsuarios.innerHTML="";
  Object.keys(porUsuario).forEach(u=>{
    tablaUsuarios.innerHTML+=`<tr><td>${u}</td><td>${porUsuario[u].toFixed(2)}%</td></tr>`;
  });
}
</script>
